name: Manual release

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ch-flow

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with Jest
        run: npm test

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version: ${{ steps.extract_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from package.json
        id: extract_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Version extracted from package.json: $VERSION"

      - name: Set image namespace variable
        run: |
          NAMESPACE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "NAMESPACE=$NAMESPACE" >> "$GITHUB_ENV"
          echo "Namespace: $NAMESPACE"

      - name: Check if image tag exists on GHCR
        run: |
          EXISTS_GHCR=false
          if docker manifest inspect ghcr.io/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}; then
            echo "$NAMESPACE/$IMAGE_NAME image tag $VERSION exists on GHCR"
            EXISTS_GHCR=true
          fi
          echo "EXISTS_GHCR=$EXISTS_GHCR" >> $GITHUB_ENV

      - name: Check if image tag exists on Docker Hub
        run: |
          EXISTS_DOCKERHUB=false
          if docker manifest inspect docker.io/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}; then
            echo "$NAMESPACE/$IMAGE_NAME image tag $VERSION exists on Docker Hub"
            EXISTS_DOCKERHUB=true
          fi
          echo "EXISTS_DOCKERHUB=$EXISTS_DOCKERHUB" >> $GITHUB_ENV

      - name: Fail if both DockerHub and GHCR images exist
        run: |
          if [ "$EXISTS_GHCR" = "true" ] && [ "$EXISTS_DOCKERHUB" = "true" ]; then
            echo "Both DockerHub and GHCR image tags exist. Failing the pipeline."
            exit 1
          fi

      - name: Set up QEMU
        if: env.EXISTS_GHCR != 'true' || env.EXISTS_DOCKERHUB != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: env.EXISTS_GHCR != 'true' || env.EXISTS_DOCKERHUB != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compose image tags for registries that need a push
        id: image_tags
        if: env.EXISTS_GHCR != 'true' || env.EXISTS_DOCKERHUB != 'true'
        run: |
          TAGS=""
          if [ "$EXISTS_GHCR" != "true" ]; then
            TAGS="${TAGS}ghcr.io/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"$'\n'
            TAGS="${TAGS}ghcr.io/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"$'\n'
          fi
          if [ "$EXISTS_DOCKERHUB" != "true" ]; then
            TAGS="${TAGS}${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"$'\n'
            TAGS="${TAGS}${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"$'\n'
          fi
          {
            echo 'tags<<EOF'
            printf '%s' "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: env.EXISTS_GHCR != 'true'
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        if: env.EXISTS_DOCKERHUB != 'true'
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ env.NAMESPACE }} --password-stdin

      - name: Build and push multi-arch image (amd64 + arm64)
        if: env.EXISTS_GHCR != 'true' || env.EXISTS_DOCKERHUB != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: '${{ needs.build-and-push.outputs.version }}'
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          generateReleaseNotes: true
          draft: true
          prerelease: false
