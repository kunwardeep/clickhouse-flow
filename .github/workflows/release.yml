name: Manual release

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ch-flow

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with Jest
        run: npm test

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
      namespace: ${{ steps.meta.outputs.namespace }}
      dockerhub_username: ${{ steps.meta.outputs.dockerhub_username }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version, namespace, and Docker Hub username
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          VERSION=$(jq -r .version package.json)
          NAMESPACE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DH_USER="${DOCKERHUB_USERNAME:-$NAMESPACE}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "dockerhub_username=$DH_USER" >> "$GITHUB_OUTPUT"

      - name: Fail if version tag already exists on both registries
        env:
          NS: ${{ steps.meta.outputs.namespace }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          EXISTS_GHCR=false
          docker manifest inspect "ghcr.io/${NS}/${IMAGE_NAME}:${VER}" >/dev/null 2>&1 && EXISTS_GHCR=true
          EXISTS_DH=false
          docker manifest inspect "docker.io/${NS}/${IMAGE_NAME}:${VER}" >/dev/null 2>&1 && EXISTS_DH=true

          if [ "$EXISTS_GHCR" = "true" ] && [ "$EXISTS_DH" = "true" ]; then
            echo "::error::${IMAGE_NAME}:${VER} already published to both registries — bump package.json."
            exit 1
          fi

  # Native runners per arch
  build-arch:
    name: Build (${{ matrix.arch }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ needs.preflight.outputs.dockerhub_username }}" --password-stdin

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=ghcr.io/${{ needs.preflight.outputs.namespace }}/${{ env.IMAGE_NAME }},docker.io/${{ needs.preflight.outputs.namespace }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge multi-arch manifests
    runs-on: ubuntu-latest
    needs: [preflight, build-arch]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ needs.preflight.outputs.dockerhub_username }}" --password-stdin

      - name: Create and push multi-arch manifests
        working-directory: /tmp/digests
        env:
          NS: ${{ needs.preflight.outputs.namespace }}
          VER: ${{ needs.preflight.outputs.version }}
        run: |
          shopt -s nullglob
          SRC_GHCR=()
          SRC_DH=()
          for d in *; do
            SRC_GHCR+=("ghcr.io/${NS}/${IMAGE_NAME}@sha256:${d}")
            SRC_DH+=("docker.io/${NS}/${IMAGE_NAME}@sha256:${d}")
          done

          docker buildx imagetools create \
            -t "ghcr.io/${NS}/${IMAGE_NAME}:${VER}" \
            -t "ghcr.io/${NS}/${IMAGE_NAME}:latest" \
            "${SRC_GHCR[@]}"

          docker buildx imagetools create \
            -t "docker.io/${NS}/${IMAGE_NAME}:${VER}" \
            -t "docker.io/${NS}/${IMAGE_NAME}:latest" \
            "${SRC_DH[@]}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, merge-manifests]

    steps:
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ needs.preflight.outputs.version }}"
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          generateReleaseNotes: true
          draft: true
          prerelease: false
